<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Discord Overlay Generator</title>
  <link rel="stylesheet" href="./styles.css?v=20260307-33">
</head>
<body>
  <main class="app-shell">
    <section class="panel settings-panel">
      <div class="panel-header">
        <p class="eyebrow">OBS Discord Overlay CSS</p>
      </div>
      <div class="tab-bar" role="tablist" aria-label="設定タブ">
        <button id="tab-shared" class="tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-shared">共通設定</button>
        <button id="tab-users" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="panel-users">ユーザー設定</button>
      </div>

      <section id="panel-shared" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-shared">
      <form id="shared-form" class="form-grid">
          <label>
            <span>スロット間隔 (px)</span>
            <input id="slot-spacing" name="slotSpacing" type="number" min="0" step="1" value="78">
          </label>

          <input id="overlap" name="overlap" type="hidden" value="30">

          <label>
            <span>スタック左余白 (px)</span>
            <input id="stack-left-padding" name="stackLeftPadding" type="number" min="0" step="1" value="18">
          </label>

          <label>
            <span>クリップ形状プリセット (4点)</span>
            <select id="clip-preset" name="clipPreset">
              <option value="light">弱め</option>
              <option value="medium" selected>標準</option>
            <option value="strong">強め</option>
            <option value="extreme">かなり強め</option>
            <option value="custom">カスタム</option>
            </select>
          </label>

          <label>
            <span>画像サイズプリセット (幅/高さ)</span>
            <select id="shared-size-preset" name="sharedSizePreset">
              <option value="small">小</option>
              <option value="medium" selected>中</option>
              <option value="large">大</option>
              <option value="xlarge">特大</option>
              <option value="custom">カスタム</option>
            </select>
          </label>

          <label>
            <span>最小高さ (px, 全体が切れないための最低値)</span>
            <input id="min-height" name="minHeight" type="number" min="1" max="480" step="1" value="96">
          </label>

          <div class="full toggle-row">
            <label class="toggle">
              <input id="enable-glow" name="enableGlow" type="checkbox" checked>
              <span>発話時に明るくする</span>
          </label>

          <label class="toggle">
            <input id="enable-bobbing" name="enableBobbing" type="checkbox" checked>
              <span>発話時揺らす</span>
            </label>
          </div>

          <details id="shared-advanced-panel" class="full advanced-panel">
            <summary>詳細設定</summary>
            <div class="advanced-grid">
              <div class="full advanced-section-label">セレクタ</div>
              <label>
                <span>コンテナセレクタ</span>
                <input id="container-selector" name="containerSelector" type="text" value=".voice_states" spellcheck="false">
              </label>

              <label>
                <span>発話中クラス名</span>
                <input id="speaking-class" name="speakingClass" type="text" value="wrapper_speaking" spellcheck="false">
              </label>

              <label>
                <span>Z-index 基準値</span>
                <input id="z-index-base" name="zIndexBase" type="number" step="1" value="10">
              </label>

              <div class="full advanced-divider" aria-hidden="true"></div>
              <div class="full advanced-section-label">画像</div>
              <label>
                <span>取込画像の最大高さ (px, Data URL化前に縮小)</span>
                <input id="resize-max-height" name="resizeMaxHeight" type="number" min="1" step="1" value="384">
              </label>

              <label>
                <span>取込画像の最大幅 (px, Data URL化前に縮小)</span>
                <input id="resize-max-width" name="resizeMaxWidth" type="number" min="1" step="1" value="216">
              </label>

              <label>
                <span>表示幅 (px)</span>
                <input id="shared-display-width" name="sharedDisplayWidth" type="number" min="1" step="1" value="90">
              </label>

              <label>
                <span>表示高さ (px)</span>
                <input id="shared-display-height" name="sharedDisplayHeight" type="number" min="1" step="1" value="160">
              </label>

              <div class="full advanced-divider" aria-hidden="true"></div>
              <div class="full advanced-section-label">クリップ形状</div>
              <label>
                <span>左上クリップ位置 (%)</span>
                <input id="clip-left-top" name="clipLeftTop" type="number" min="0" max="100" step="1" value="24">
              </label>

              <label>
                <span>右上クリップ位置 (%)</span>
                <input id="clip-right-top" name="clipRightTop" type="number" min="0" max="100" step="1" value="100">
              </label>

              <label>
                <span>右下クリップ位置 (%)</span>
                <input id="clip-right-bottom" name="clipRightBottom" type="number" min="0" max="100" step="1" value="76">
              </label>

              <label>
                <span>左下クリップ位置 (%)</span>
                <input id="clip-left-bottom" name="clipLeftBottom" type="number" min="0" max="100" step="1" value="0">
              </label>

              <div class="full advanced-divider" aria-hidden="true"></div>
              <div class="full advanced-section-label">発話時フレーム</div>
              <label>
                <span>フレーム線色</span>
                <input id="frame-color" name="frameColor" type="color" value="#ffffff">
              </label>

              <label>
                <span>フレーム発光色</span>
                <input id="frame-glow-color" name="frameGlowColor" type="color" value="#ffffff">
              </label>

              <label>
                <span>フレーム線幅 (px)</span>
                <input id="frame-stroke-width" name="frameStrokeWidth" type="number" min="0" step="0.5" value="2">
              </label>

              <label>
                <span>フレーム発光強度</span>
                <input id="frame-glow-strength" name="frameGlowStrength" type="number" min="0.2" max="3" step="0.1" value="1">
              </label>

              <div class="full advanced-divider" aria-hidden="true"></div>
              <div class="full advanced-section-label">発話時アニメーション</div>
              <label>
                <span>発話時フィルター強度</span>
                <input id="speaking-filter-strength" name="speakingFilterStrength" type="number" min="0" max="2" step="0.1" value="0.5">
              </label>

              <label>
                <span>ボビング移動量 (px)</span>
                <input id="bob-distance" name="bobDistance" type="number" min="0" step="1" value="4">
              </label>

              <label>
                <span>ボビング周期 (秒)</span>
                <input id="bob-duration" name="bobDuration" type="number" min="0.1" step="0.1" value="0.6">
              </label>
            </div>
          </details>
        </form>
      </section>

      <section id="panel-users" class="tab-panel" role="tabpanel" aria-labelledby="tab-users" hidden>
        <div class="panel-header users-header">
          <p class="eyebrow">ユーザー</p>
          <button id="add-user" class="ghost" type="button">ユーザー追加</button>
        </div>
        <div id="user-tab-bar" class="user-tab-bar" role="tablist" aria-label="ユーザータブ"></div>
        <p id="user-empty-state" class="user-empty-state" hidden>ユーザーはまだありません。まず「ユーザー追加」で1人目を作成してください。</p>
        <div id="user-list" class="user-list single-user"></div>
      </section>
    </section>

    <section class="panel output">
      <div class="panel-header output-header">
        <p class="eyebrow">生成CSS</p>
      </div>
      <div class="output-actions">
        <label class="ghost file-action">
          <span>JSON読込</span>
          <input id="load-json" type="file" accept="application/json">
        </label>
        <button id="save-json" class="ghost" type="button">JSON保存</button>
        <button id="copy-css" class="ghost primary" type="button">CSSをコピー</button>
      </div>
      <textarea id="css-output" class="css-output" rows="24" readonly></textarea>
      <p id="copy-status" class="copy-status" aria-live="polite"></p>
    </section>

    <section class="panel preview-panel">
      <div class="panel-header">
        <p class="eyebrow">プレビュー</p>
      </div>
      <div class="preview-stage">
        <div id="preview-canvas" class="preview-canvas"></div>
        <p id="preview-empty-state" class="preview-empty-state" hidden>プレビュー対象のユーザーがいません。</p>
      </div>
    </section>
  </main>

  <div id="resume-modal" class="resume-modal" hidden>
    <div class="resume-dialog" role="dialog" aria-modal="true" aria-labelledby="resume-title">
      <p class="eyebrow">前回の下書き</p>
      <h2 id="resume-title">前回のローカル下書きを使いますか？</h2>
      <p id="resume-description" class="resume-copy">前回保存されたローカル下書きがあります。</p>
      <div class="resume-actions">
        <button id="resume-previous" class="ghost primary" type="button">前回の続きを使う</button>
        <button id="resume-new" class="ghost" type="button">新規作成</button>
      </div>
    </div>
  </div>

  <div class="app-meta app-meta-left" aria-label="バージョン">v20260307-33</div>
  <a
    class="app-meta app-meta-right"
    href="https://streamkit.discord.com/overlay"
    target="_blank"
    rel="noreferrer noopener"
  >
    Discord Streamkit オーバーレイ
  </a>

  <template id="user-row-template">
    <article class="user-card">
      <div class="user-card-header">
        <strong class="user-card-title">ユーザー</strong>
        <div class="user-card-actions">
          <button class="ghost move-user-left" type="button" aria-label="ユーザーを左へ移動">&larr;</button>
          <button class="ghost move-user-right" type="button" aria-label="ユーザーを右へ移動">&rarr;</button>

          <label class="toggle compact-toggle">
            <input class="is-speaking" type="checkbox">
            <span>発話プレビュー</span>
          </label>

          <button class="danger remove-user" type="button">削除</button>
        </div>
      </div>

      <div class="user-grid">
        <label>
          <span>表示名</span>
          <input class="user-label" type="text" value="ユーザー 1" spellcheck="false">
        </label>

        <label>
          <span>Discord User ID</span>
          <input class="user-id" type="text" placeholder="123456789012345678" spellcheck="false">
        </label>

        <label>
          <span>上下オフセット (px)</span>
          <input class="top-offset" type="number" step="1" value="0">
        </label>

        <label class="full visually-hidden">
          <span>画像 Data URL</span>
          <textarea class="data-url" rows="4" placeholder="data:image/png;base64,..."></textarea>
        </label>

        <div class="full file-row">
          <label class="file-picker">
            <span>画像ファイル読込 / 画像を貼り付け</span>
            <input class="image-file" type="file" accept="image/*">
          </label>
        </div>
      </div>
    </article>
  </template>

  <script src="./app.js?v=20260307-33"></script>
</body>
</html>
